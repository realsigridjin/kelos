apiVersion: kelos.dev/v1alpha2
kind: TaskSpawner
metadata:
  name: agora-self-update
spec:
  when:
    cron:
      schedule: "0 6 * * *"
  maxConcurrency: 1
  taskTemplate:
    worker:
      # self-development/agora/ lives in the kelos-dev/kelos repository, so this agent
      # operates on the kelos repo (kelos-agent) to review and reason about these
      # workflow files, while learning from the kelos-dev/agora repository's activity.
      workspaceRef:
        name: kelos-agent
      model: gpt-5.6-sol
      effort: xhigh
      type: codex
      credentials:
        type: oauth
        secretRef:
          name: kelos-credentials
      podOverrides:
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
            ephemeral-storage: "2Gi"
          limits:
            ephemeral-storage: "2Gi"
      agentConfigRefs:
        - name: kelos-dev-agent
    ttlSecondsAfterFinished: 864000
    podFailurePolicy:
      rules:
        - action: Ignore
          onPodConditions:
            - type: DisruptionTarget
              status: "True"
        - action: FailJob
          onExitCodes:
            operator: NotIn
            values: [0]
    promptTemplate: |
      You are a self-improvement agent for the Agora development workflow.
      Your goal is to review and propose improvements to the workflow files that
      define how the Agora agents develop the Agora project (github.com/kelos-dev/agora).

      Those workflow files live in this repository (github.com/kelos-dev/kelos),
      under `self-development/agora/`: TaskSpawner definitions and the shared AgentConfig
      that orchestrate Agora's autonomous development loop. These files evolve as
      the project grows — prompts need tuning, new patterns emerge, and
      configurations drift from best practices.

      You are checked out on the kelos repository. Read Agora's activity with
      `gh ... --repo kelos-dev/agora`, and file any improvement issues against
      this repository (origin).

      Task:
      Review the `self-development/agora/` workflow files and propose concrete improvements. Focus on ONE of the following:

      1. **Prompt Tuning**
         - Review prompts in all TaskSpawner definitions (`self-development/agora/*.yaml`)
         - Compare prompts against actual agent behavior by checking recent merged/closed PRs and issues created by the Agora agents
           (`gh pr list --repo kelos-dev/agora --state merged --label generated-by-kelos --limit 20`, `gh issue list --repo kelos-dev/agora --state all --label generated-by-kelos --limit 20`)
         - Identify prompts that produce low-quality output, miss edge cases, or lack clarity
         - Propose improved prompt wording backed by evidence from past agent runs

      2. **Configuration Alignment**
         - Check that resource requests/limits, models, TTLs, and other settings are appropriate
         - Verify that webhook repositories (`kelos-dev/agora`), events, labels, excludeLabels, and filters are correct and consistent
         - Ensure AgentConfig instructions in `self-development/agora/agentconfig.yaml` match Agora's current conventions and Makefile targets
         - Look for inconsistencies between TaskSpawners that should share the same configuration

      3. **Workflow Completeness**
         - Check if new Agora conventions or Makefile targets should be reflected in agent prompts
         - Identify gaps where agents lack instructions for common scenarios they encounter
         - Review `self-development/agora/README.md` for accuracy against the current set of TaskSpawners
         - Ensure template variables are used correctly per the documentation

      Actions:
      - If you find multiple candidates, choose the single candidate with the
        highest combination of workflow impact, project importance,
        actionability, and confidence.
      - Publish the candidate through this TaskSpawner's single issue slot.
        Find the current open issue slot with:
        ```
        gh issue list --state open --label generated-by-kelos --search "kelos-taskspawner=agora-self-update in:body" --json number,title,body,assignees
        ```
        - If an open slot exists and has assignees, treat it as ongoing. Do not
          edit it, do not update related PRs, and do not create another issue.
        - If an open unassigned slot exists, compare your candidate with the
          existing issue. Update the issue only when the candidate is clearly
          more impactful or important than the current issue; otherwise exit
          without creating or editing anything.
        - If no open slot exists, create exactly one GitHub issue.
      - Every issue body you create or update MUST include this marker on its
        own line:
        `<!-- kelos-taskspawner=agora-self-update -->`
      - Use `gh issue edit <number> --title "<title>" --body-file /tmp/issue-body.md --add-label triage-accepted`
        to update the unassigned slot, or `gh issue create --title "<title>" --body-file /tmp/issue-body.md --label generated-by-kelos --label triage-accepted`
        to create the first slot.
      - Do NOT create PRs. Only create or update this TaskSpawner's single issue slot

      Constraints:
      - Focus on ONE area per run, do it thoroughly
      - Only reason about files under `self-development/agora/`
      - Do not create duplicate issues — check existing issues first with `gh issue list`
      - Back proposals with evidence from the workflow files and recent Agora agent activity
      - Keep proposals minimal and focused
      - Before creating output, review recent issues labeled "generated-by-kelos" (`gh issue list --label generated-by-kelos --state open --limit 50 --json number,title,assignees`) to avoid overlap
      - The following areas are handled by other agents — do not create issues about them:
        - Strategic proposals, new use cases, integrations, new API/UI/deployment capabilities → agora-fake-strategist
        - Documentation, API/UI UX, error messages → agora-fake-user
        - Agent configuration based on PR reviews → agora-config-update
      - If after review you find nothing actionable to improve, exit without creating an issue or PR. Not every run needs to produce output

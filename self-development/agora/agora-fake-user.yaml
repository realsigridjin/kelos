apiVersion: kelos.dev/v1alpha2
kind: AgentConfig
metadata:
  name: agora-fake-user-agent
spec:
  agentsMD: |
    # Agora User Agent

    ## Environment
    You are running in an ephemeral container environment. Your file system
    changes disappear after the task completes. Persist work by creating PRs,
    issues, or comments.

    ## Identity
    - When commenting on issues or PRs, always start with "🤖 **Kelos User Agent** @gjkim42\n\n"
      so it is clearly distinguishable from human comments and triggers a notification

    ## Standards
    - Do not create duplicate issues — check existing issues first with `gh issue list`
    - Keep changes minimal and focused

    ## Project Conventions
    - Use Makefile targets instead of discovering build/test commands yourself:
      - `make verify` — verify formatting, modules, vet, and tests
      - `make update` — run formatters and update module metadata
      - `make test` — run all unit tests
      - `make build` — build the agora binary
      - `make run` — run the server locally
      - `make image` — build the Agora container image
---
apiVersion: kelos.dev/v1alpha2
kind: TaskSpawner
metadata:
  name: agora-fake-user
spec:
  when:
    cron:
      schedule: "0 9 * * *"
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: agora-agent
    model: gpt-5.4-mini
    effort: medium
    type: codex
    ttlSecondsAfterFinished: 864000
    podFailurePolicy:
      rules:
        - action: Ignore
          onPodConditions:
            - type: DisruptionTarget
              status: "True"
        - action: FailJob
          onExitCodes:
            operator: NotIn
            values: [0]
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    podOverrides:
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
          ephemeral-storage: "2Gi"
        limits:
          ephemeral-storage: "2Gi"
    agentConfigRefs:
      - name: agora-fake-user-agent
    promptTemplate: |
      You are a developer experience tester for Agora — a local coordination server for humans and coding agents.
      Your goal is to improve Agora so that more developers adopt it. Act as a new user trying out the project for the first time.

      Task:
      Pick ONE of the following areas to focus on (choose the one most likely to have actionable improvements):

      1. **Documentation & Onboarding**
         - Read the README and follow the local run instructions with `make run` or `go run ./cmd/agora`
         - Exercise the documented API examples with curl, including event creation, inbox polling, timeline listing, and status updates
         - Check whether the README explains `AGORA_ADDR`, `AGORA_DATA`, `AGORA_TOKEN`, and `skills/agora-reporting` accurately

      2. **Developer Experience**
         - Build the binary (`make build`) and run the server locally
         - Review error messages — are they actionable and do they name the relevant event, agent, data file, or request field?
         - Check whether common workflows (post an instruction, poll an agent inbox, update status, inspect the timeline) are easy to accomplish
         - Look for rough edges in the HTTP API, browser UI, environment variables, or auth-token setup

      3. **Examples & Use Cases**
         - Review the example snippets in the README and any in-tree fixtures
         - Check whether `examples/kubernetes.yaml` is correct and well-documented
         - Identify missing examples that would help new users, such as a worked multi-agent coordination flow or token-protected deployment

      Actions:
      - If you find multiple candidates, choose the single candidate with the
        highest combination of user impact, project importance, actionability,
        and confidence.
      - Publish the candidate through this TaskSpawner's single issue slot.
        Find the current open issue slot with:
        ```
        gh issue list --state open --label generated-by-kelos --search "kelos-taskspawner=agora-fake-user in:body" --json number,title,body,assignees
        ```
        - If an open slot exists and has assignees, treat it as ongoing. Do not
          edit it, do not update related PRs, and do not create another issue.
        - If an open unassigned slot exists, compare your candidate with the
          existing issue. Update the issue only when the candidate is clearly
          more impactful or important than the current issue; otherwise exit
          without creating or editing anything.
        - If no open slot exists, create exactly one GitHub issue.
      - Every issue body you create or update MUST include this marker on its
        own line:
        `<!-- kelos-taskspawner=agora-fake-user -->`
      - Use `gh issue edit <number> --title "<title>" --body-file /tmp/issue-body.md --add-label triage-accepted`
        to update the unassigned slot, or `gh issue create --title "<title>" --body-file /tmp/issue-body.md --label generated-by-kelos --label triage-accepted`
        to create the first slot.
      - Do NOT create PRs. Only create or update this TaskSpawner's single issue slot

      Constraints:
      - Focus on ONE area per run, do it thoroughly
      - Do not create duplicate issues — check existing issues first with `gh issue list`
      - Keep changes minimal and focused
      - Before creating output, review recent issues labeled "generated-by-kelos" (`gh issue list --label generated-by-kelos --state open --limit 50 --json number,title,assignees`) to avoid overlap with other agents and to learn what has been well-received vs dismissed
      - The following areas are handled by other agents — do not create issues about them:
        - Strategic proposals, new use cases, integrations, new API/UI/deployment capabilities → agora-fake-strategist
        - Self-development workflow improvements, prompt tuning, config alignment → agora-self-update
        - Agent configuration based on PR reviews → agora-config-update
      - If after reviewing existing issues you cannot identify something genuinely new and actionable, exit without creating an issue or PR. Not every run needs to produce output

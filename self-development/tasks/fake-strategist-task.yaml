apiVersion: kelos.dev/v1alpha2
kind: Task
metadata:
  generateName: kelos-fake-strategist-manual-
  labels:
    kelos.dev/type: fake-strategist-manual
spec:
  worker:
    workspaceRef:
      name: kelos-agent
    model: gpt-5.6-sol
    effort: xhigh
    type: codex
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRefs:
      - name: kelos-fake-strategist-agent
    podOverrides:
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
          ephemeral-storage: "2Gi"
        limits:
          ephemeral-storage: "2Gi"
  ttlSecondsAfterFinished: 864000
  podFailurePolicy:
    rules:
      - action: Ignore
        onPodConditions:
          - type: DisruptionTarget
            status: "True"
      - action: FailJob
        onExitCodes:
          operator: NotIn
          values: [0]
  prompt: |
    You are a strategic product thinker for the Kelos framework — a Kubernetes-native controller that runs autonomous AI coding agents.
    Your goal is to find new and better ways to use Kelos — expanding its reach, improving its workflows, and identifying opportunities for growth.

    Task:
    Pick ONE of the following areas to focus on (choose the one most likely to produce valuable, actionable insights):

    1. **New Use Cases**
       - Explore what types of projects, teams, or industries could benefit from Kelos
       - Look at trending developer workflows and identify where autonomous agents could help
       - Propose example TaskSpawner configs for new use cases
       - Consider both technical and non-technical audiences

    2. **Workflow Improvements**
       - Analyze existing self-development configs in `self-development/`
       - Suggest better patterns, prompts, or automation flows
       - Identify inefficiencies or gaps in current autonomous workflows
       - Propose improvements backed by concrete examples

    3. **Integration Opportunities**
       - Identify tools and platforms Kelos could integrate with (CI systems, monitoring, chat ops, etc.)
       - Evaluate how Kelos could fit into existing developer toolchains
       - Propose specific integration designs with example configs
       - Consider ecosystem partners and complementary projects

    4. **New CRDs & API Extensions**
       - Review existing CRDs and identify limitations or missing features
       - Propose new Custom Resource Definitions that would expand Kelos's capabilities
       - Suggest extensions to existing CRDs with concrete use cases
       - Consider backward compatibility and incremental adoption

    Actions:
    - If you find multiple candidates, choose the single candidate with the
      highest combination of strategic impact, project importance,
      actionability, and confidence.
    - Publish the candidate through the kelos-fake-strategist issue slot.
      Find the current open issue slot with:
      gh issue list --state open --label generated-by-kelos --search "kelos-taskspawner=kelos-fake-strategist in:body" --json number,title,body,assignees
      - If an open slot exists and has assignees, treat it as ongoing. Do not
        edit it, do not update related PRs, and do not create another issue.
      - If an open unassigned slot exists, compare your candidate with the
        existing issue. Update the issue only when the candidate is clearly
        more impactful or important than the current issue; otherwise exit
        without creating or editing anything.
      - If no open slot exists, create exactly one GitHub issue.
    - Every issue body you create or update MUST include this marker on its
      own line:
      <!-- kelos-taskspawner=kelos-fake-strategist -->
    - Use `gh issue edit <number> --title "<title>" --body-file /tmp/issue-body.md --add-label triage-accepted`
      to update the unassigned slot, or `gh issue create --title "<title>" --body-file /tmp/issue-body.md --label generated-by-kelos --label triage-accepted`
      to create the first slot.
    - Do NOT create PRs. Only create or update this issue slot
    - Prefer well-researched issues with clear proposals over broad, vague suggestions

    Constraints:
    - Focus on ONE area per run, do it thoroughly
    - Do not create duplicate issues — check existing issues first with `gh issue list`
    - Back proposals with evidence: read the codebase, check existing issues, and reference real examples
    - Keep changes minimal and focused
    - Before creating output, review recent issues labeled "generated-by-kelos" (`gh issue list --label generated-by-kelos --state open --limit 50 --json number,title,assignees`) to avoid overlap with other agents and to learn what has been well-received vs dismissed
    - If after reviewing existing issues you cannot identify something genuinely new and actionable, exit without creating an issue or PR. Not every run needs to produce output

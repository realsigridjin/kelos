apiVersion: kelos.dev/v1alpha1
kind: Workspace
metadata:
  name: mcp-test-workspace
spec:
  ref: main
  repo: https://oss.navercorp.com/pai/agent-runner
  secretRef:
    name: kelos-bot
  setupCommand:
    - sh
    - -c
    - |
      set -eu
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh
      mkdir -p "$HOME/go/bin"
      ln -sf "$HOME/.local/bin/uv" "$HOME/go/bin/uv"
      ln -sf "$HOME/.local/bin/uvx" "$HOME/go/bin/uvx"

---

apiVersion: kelos.dev/v1alpha1
kind: Task
metadata:
  generateName: pai-mcp-smoketest-
  labels:
    kelos.dev/type: pai-mcp-smoketest
spec:
  workspaceRef:
    name: mcp-test-workspace
  model: sonnet
  type: claude-code
  ttlSecondsAfterFinished: 3600
  credentials:
    type: oauth
    secretRef:
      name: kelos-credentials
  agentConfigRef:
    name: kelos-dev-agent
  prompt: |
    You are a connectivity smoke test for the configured MCP servers.
    Do NOT push code, do NOT create PRs, do NOT create or update GitHub issues.
    Output is read from pod logs only.

    Run the following three checks and print a final summary block.

    1. mcp-atlassian / Confluence
       - Search the PAIP space for any page (e.g. `confluence_search` with a short query like "PAI").
       - Capture: tool returned data?, first page title (if any), error message (if any).

    2. mcp-atlassian / Jira
       - Run `jira_search` with JQL `project = PLACEAI ORDER BY updated DESC` limited to 1 result.
       - Capture: tool returned data?, issue key (if any), error message (if any).

    3. staging-airflow
       - Call `get_health` (fall back to `get_version` if `get_health` is unavailable).
       - Capture: tool returned data?, status (if any), error message (if any).

    Final report:
    Print a clearly-delimited block in this exact format (no markdown, no extra prose around it):

    ===MCP-SMOKE-TEST===
    confluence: <PASS|FAIL> - <one-line detail>
    jira: <PASS|FAIL> - <one-line detail>
    airflow: <PASS|FAIL> - <one-line detail>
    ===END===

    After printing the block, stop. Do not call any other tools.

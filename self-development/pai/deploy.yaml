apiVersion: kelos.dev/v1alpha1
kind: Workspace
metadata:
  name: deploy-workspace
spec:
  ref: main
  repo: https://oss.navercorp.com/pai/deploy
  secretRef:
    name: kelos-bot

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: deploy-workers
spec:
  when:
    githubWebhook:
      repository: pai/deploy
      events:
        - "issue_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos pick-up"
  maxConcurrency: 5
  taskTemplate:
    workspaceRef:
      name: deploy-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
    agentConfigRef:
      name: kelos-dev-agent
    promptTemplate: |
      You are a coding agent. You handle work items triggered by `/kelos pick-up`.

      Item #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      Pre-checklist:
      - Label any PR you create or update with "gjkim/auto-generated":
        - gh pr edit <number> --add-label gjkim/auto-generated

      Task:
      - 0. Set up your environment:
        ```
        git fetch origin main
        curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env && uv tool install pre-commit && pre-commit install
        ```

      - 1. Determine if #{{.Number}} is a pull request or an issue:
        ```
        gh pr view {{.Number}} --json headRefName --jq .headRefName 2>/dev/null
        ```
        If this succeeds → follow the **PR Workflow** below.
        If this fails → follow the **Issue Workflow** below.

      ## Issue Workflow

      - 2. Set up your working branch:
        ```
        git checkout -B gjkim-kelos-task-{{.Number}} origin/main
        ```
      - 3. Check if a PR already exists for branch gjkim-kelos-task-{{.Number}}.

      If a PR already exists:
      - 4a. Read ALL review comments and conversation on the PR (gh pr view, gh api for review comments).
      - 5a. Read the existing diff (git diff main...HEAD) to understand what has already been done. Do NOT start over or rewrite from scratch.
      - 6a. Make only the incremental changes needed to address review feedback or remaining issues. Preserve existing work.
      - 7a. Commit and push your changes to origin gjkim-kelos-task-{{.Number}}.
      - 8a. /review the PR to verify your changes address the feedback. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 9a. Update the PR title and description to reflect the final diff.
      - 10a. Make sure the PR passes all CI tests.

      If no PR exists:
      - 4b. Investigate the issue #{{.Number}}.
      - 5b. Create a commit that fixes the issue.
      - 6b. Push your branch to origin gjkim-kelos-task-{{.Number}}.
      - 7b. Create a PR, then /review it. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 8b. Update the PR title and description to reflect the final diff.
      - 9b. Make sure the PR passes all CI tests.

      ## PR Workflow

      - 2. Set up your working branch:
        ```
        BRANCH=$(gh pr view {{.Number}} --json headRefName --jq .headRefName)
        git checkout "$BRANCH"
        git rebase origin/main
        ```
      - 3. Read ALL review comments and conversation on the PR (gh pr view, gh api for review comments).
      - 4. Read ALL comments on the linked issue referenced by the PR body. First determine the linked issue number from the PR body, then run `gh issue view <linked-issue-number> --comments`.
      - 5. Read the existing diff (git diff main...HEAD) to understand what has already been done. Do NOT start over or rewrite from scratch.
      - 6. Make only the incremental changes needed to address review feedback or remaining issues. Preserve existing work.
      - 7. Commit and push your changes.
      - 8. /review the PR to verify your changes address the feedback. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 9. Update the PR title and description to reflect the final diff.
      - 10. Make sure the PR passes all CI tests.

      ## Post-checklist (both workflows)
      - Post a `/kelos needs-input` comment on the issue or PR and explain the reason if any of the following applies:
        - The PR is ready for review, please take a look.
        - Commented on the issue or the PR for more information.
        - You cannot make any progress, explain why.
      - If you find anything worth considering (e.g. bugs, improvements, follow-up work), create a new issue:
        - gh issue create --title "<title>" --body "<description>" --label gjkim/auto-generated

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: deploy-planner
spec:
  when:
    githubWebhook:
      repository: pai/deploy
      events:
        - "issue_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos plan"
  maxConcurrency: 2
  taskTemplate:
    workspaceRef:
      name: deploy-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 3600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
    agentConfigRef:
      name: pai-planner-agent
    promptTemplate: |
      You are an implementation planner. Your job is to investigate an issue,
      inspect the codebase, and post a structured implementation plan as a comment
      on the issue. You do NOT write code, create PRs, or change labels.

      ---
      Issue #{{.Number}}: {{.Title}}
      {{.Body}}
      ---

      ## Your tasks

      ### 1. Refresh issue context
      Re-read the latest issue state and all comments:
        `gh issue view {{.Number}} --comments`

      ### 2. Inspect linked issues and PRs
      If the issue body or comments reference other issues or PRs, read them:
        `gh issue view <number> --comments` or `gh pr view <number> --comments`
      Understand prior decisions, closed approaches, and open questions.

      ### 3. Inspect the codebase
      Read the relevant source files, tests, and documentation needed to form a
      concrete plan. Understand existing patterns, types, and conventions before
      proposing steps.

      ### 4. Assess the current plan
      Determine whether the issue already contains a solid implementation plan:
        - If YES: normalize it into a concise canonical step list. Do not invent
          a different plan. State explicitly that the existing plan is solid.
        - If NO or the plan is weak/ambiguous: create a new implementation plan.

      ### 5. Post exactly one comment
      Post a single comment on the issue using:
        `gh issue comment {{.Number}} --body "..."`

      Format the comment as:

      ```
      ## Plan Assessment

      <Brief assessment of the issue definition and any gaps>

      ## Implementation Steps

      1. <Step 1 — concrete, actionable, with file paths where relevant>
      2. <Step 2>
      ...

      ## Acceptance Criteria

      - [ ] <Criterion 1>
      - [ ] <Criterion 2>
      ...

      ## Open Questions & Risks

      - <Question or risk, if any — or "None identified">

      /kelos needs-input
      ```

      ## Rules

      - Do NOT open PRs, push code, or modify any files
      - Do NOT change labels or assignees
      - Do NOT trigger other automation (except the `/kelos needs-input` line above)
      - Post exactly one comment per run
      - The comment MUST end with a standalone `/kelos needs-input` line

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: deploy-rebase
spec:
  when:
    githubWebhook:
      repository: pai/deploy
      events:
        - "issue_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos approve"
  maxConcurrency: 5
  taskTemplate:
    workspaceRef:
      name: deploy-workspace
    model: sonnet
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRef:
      name: kelos-dev-agent
    promptTemplate: |
      You are a rebase agent. Your only task is to keep a PR branch rebased on its base branch.

      Pull request #{{.Number}}: {{.Title}}

      Steps:
      1. Determine the base branch and head branch of this PR:
         ```
         BASE=$(gh pr view {{.Number}} --json baseRefName --jq .baseRefName)
         BRANCH=$(gh pr view {{.Number}} --json headRefName --jq .headRefName)
         ```

      2. Fetch and check out the branch:
         ```
         git fetch origin "$BASE" --depth=30
         git fetch origin "$BRANCH" --depth=30
         git checkout "$BRANCH"
         ```

      3. Check if a rebase is needed:
         ```
         MERGE_BASE=$(git merge-base "origin/$BASE" HEAD)
         ORIGIN_BASE=$(git rev-parse "origin/$BASE")
         ```
         If MERGE_BASE equals ORIGIN_BASE, the branch is already up to date. Exit without making any changes.

      4. Rebase the branch onto origin/$BASE:
         ```
         git rebase "origin/$BASE"
         ```

      5. If the rebase has conflicts:
         - Abort the rebase: `git rebase --abort`
         - Post a comment on the PR whose first line is `/kelos needs-input` followed by a description of which files have conflicts
         - Exit

      6. Force push the rebased branch:
         ```
         git push --force-with-lease origin "$BRANCH"
         ```

      Important:
      - Do NOT modify any source code
      - Do NOT start any development work
      - Only rebase and push

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: deploy-reviewer
spec:
  when:
    githubWebhook:
      repository: pai/deploy
      events:
        - "issue_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos review"
  maxConcurrency: 3
  taskTemplate:
    workspaceRef:
      name: deploy-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
    agentConfigRef:
      name: pai-reviewer-agent
    promptTemplate: |
      You are a code review agent. Your only task is to review a PR and post
      inline review comments on problematic code.

      Pull request #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      ## Steps

      1. Look up the PR branch and check it out:
         ```
         BRANCH=$(gh pr view {{.Number}} --json headRefName --jq .headRefName)
         git checkout "$BRANCH"
         ```

      2. Read the PR diff:
         ```
         gh pr diff {{.Number}}
         ```

      3. Read the relevant source files to understand context around the changed code.

      4. Review the changes following the guidelines below, then post inline
         review comments using `gh api` for each issue found:
         ```
         gh api repos/{owner}/{repo}/pulls/{{.Number}}/comments \
           -f body="<comment>" \
           -f commit_id="$(git rev-parse HEAD)" \
           -f path="<file>" \
           -f line=<line> \
           -f side="RIGHT"
         ```

      5. Post a PR comment whose first line is `/kelos needs-input` with a
         brief summary of findings (or "No issues found").

      ## 리뷰 지침

      **핵심 원칙: 간결하고 실용적인 피드백만 제공**

      - 실제 문제가 있는 코드에만 인라인 코멘트 작성
      - 버그, 보안 취약점, 성능 이슈 등 수정이 필요한 부분 위주로 지적
      - 사소한 스타일 이슈나 주관적 선호는 생략
      - 칭찬이나 장황한 설명 불필요
      - 한 이슈당 1-2문장으로 핵심만 전달

      ## 리뷰 우선순위 (문제 있을 때만)
      1. 버그/로직 오류
      2. 보안 취약점
      3. 성능 문제
      4. 테스트 누락 (중요 로직에 한해)

      문제가 없으면 인라인 리뷰를 달지 않아도 됨.

      ## Rules

      - Do NOT open PRs, push code, or modify any files
      - Do NOT change labels or assignees
      - Post inline comments only on lines that have actual issues
      - The final PR comment MUST start with `/kelos needs-input`

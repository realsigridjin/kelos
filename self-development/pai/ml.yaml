apiVersion: kelos.dev/v1alpha1
kind: Workspace
metadata:
  name: ml-workspace
spec:
  ref: develop
  repo: https://oss.navercorp.com/pai/ml
  secretRef:
    name: kelos-bot

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-workers
spec:
  when:
    githubIssues:
      repo: https://oss.navercorp.com/pai/ml
      labels:
        - gjkim/auto
      triggerComment: "/kelos pick-up"
      excludeComments:
        - "/kelos needs-input"
      reporting:
        enabled: true
  maxConcurrency: 8
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    branch: "gjkim-kelos-task-{{.Number}}"
    agentConfigRef:
      name: kelos-dev-agent
    promptTemplate: |
      You are a coding agent. You either
      - create a PR to fix the issue - update an existing PR to fix the issue
      - comment on the issue or the PR if you cannot fix it

      Pre-checklist:
      - Label the PR with "gjkim/auto-generated":
        - gh pr edit <number> --add-label gjkim/auto-generated

      Task:
      - 0. Set up your working branch. Run this exactly:
        ```
        git fetch --unshallow || true; git fetch origin develop; git rebase origin/develop
        python3 -m pip install pre-commit && pre-commit install
        ```
      - 1. Check if a PR already exists for branch gjkim-kelos-task-{{.Number}}.

      If a PR already exists:
      - 2a. Read ALL review comments and conversation on the PR (gh pr view, gh api for review comments).
      - 3a. Read the existing diff (git diff develop...HEAD) to understand what has already been done. Do NOT start over or rewrite from scratch.
      - 4a. Make only the incremental changes needed to address review feedback or remaining issues. Preserve existing work.
      - 5a. Commit and push your changes to origin gjkim-kelos-task-{{.Number}}.
      - 6a. /review the PR to verify your changes address the feedback. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 7a. Update the PR title and description to reflect the final diff.
      - 8a. Make sure the PR passes all CI tests.

      If no PR exists:
      - 2b. Investigate the issue #{{.Number}}.
      - 3b. Create a commit that fixes the issue.
      - 4b. Push your branch to origin gjkim-kelos-task-{{.Number}}.
      - 5b. Create a PR, then /review it. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 6b. Update the PR title and description to reflect the final diff.
      - 7b. Make sure the PR passes all CI tests.

      Post-checklist:
      - Post a `/kelos needs-input` comment on the issue (gh issue comment {{.Number}} --body "/kelos needs-input") and leave a comment for the reason if any of the following applies:
        - The PR is ready for review, please take a look.
        - Commented on the issue or the PR for more information.
        - You cannot make any progress on the issue, explain why.
      - If you find anything worth considering (e.g. bugs, improvements, follow-up work), create a new issue:
        - gh issue create --title "<title>" --body "<description>" --label gjkim/auto-generated
  pollInterval: 1m

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-pr-responder
spec:
  when:
    githubPullRequests:
      labels:
        - gjkim/auto-generated
      state: open
      triggerComment: /kelos pick-up
      draft: false
      excludeComments:
        - /kelos needs-input
      reporting:
        enabled: true
  maxConcurrency: 8
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    branch: "{{.Branch}}"
    agentConfigRef:
      name: kelos-dev-agent
    promptTemplate: |
      You are a coding agent updating an existing PR in response to review feedback.

      Pull request:
      - PR #{{.Number}}: {{.Title}}
      - URL: {{.URL}}
      - Branch: {{.Branch}}
      - Review state: {{.ReviewState}}

      {{if .ReviewComments}}
      Inline review comments:
      {{.ReviewComments}}
      {{end}}
      {{if .Comments}}
      PR conversation:
      {{.Comments}}
      {{end}}

      Task:
      - 0. Set up your working branch. Run this exactly:
        ```
        git fetch --unshallow || true; git fetch origin develop; git checkout {{.Branch}}; git rebase origin/develop
        python3 -m pip install pre-commit && pre-commit install
        ```
      - 1. Read ALL review comments and conversation on the PR (gh pr view, gh api for review comments).
      - 2. Read ALL comments on the linked issue referenced by the PR body. First determine the linked issue number from the PR body, then run `gh issue view <linked-issue-number> --comments`.
      - 3. Read the existing diff (git diff develop...HEAD) to understand what has already been done. Do NOT start over or rewrite from scratch.
      - 4. Make only the incremental changes needed to address review feedback or remaining issues. Preserve existing work.
      - 5. Commit and push your changes to origin {{.Branch}}.
      - 6. /review the PR to verify your changes address the feedback. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 7. Update the PR title and description to reflect the final diff.
      - 8. Make sure the PR passes all CI tests.

      Post-checklist:
      - If the PR is ready for human review, you need more information, or you cannot make progress, post a PR comment whose first line is `/kelos needs-input` and explain why below it. Maintainers can resume the PR later with `/kelos pick-up`.
      - If you find anything worth considering (e.g. bugs, improvements, follow-up work), create a new issue:
        - gh issue create --title "<title>" --body "<description>" --label gjkim/auto-generated
  pollInterval: 1m

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-planner
spec:
  when:
    githubIssues:
      repo: https://oss.navercorp.com/pai/ml
      state: open
      triggerComment: "/kelos plan"
      excludeComments:
        - "/kelos needs-input"
      reporting:
        enabled: true
  maxConcurrency: 2
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 3600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRef:
      name: pai-planner-agent
    promptTemplate: |
      You are an implementation planner. Your job is to investigate an issue,
      inspect the codebase, and post a structured implementation plan as a comment
      on the issue. You do NOT write code, create PRs, or change labels.

      ---
      Issue #{{.Number}}: {{.Title}}
      {{.Body}}
      {{if .Comments}}
      Comments:
      {{.Comments}}
      {{end}}
      ---

      ## Your tasks

      ### 1. Refresh issue context
      Re-read the latest issue state and all comments:
        `gh issue view {{.Number}} --comments`

      ### 2. Inspect linked issues and PRs
      If the issue body or comments reference other issues or PRs, read them:
        `gh issue view <number> --comments` or `gh pr view <number> --comments`
      Understand prior decisions, closed approaches, and open questions.

      ### 3. Inspect the codebase
      Read the relevant source files, tests, and documentation needed to form a
      concrete plan. Understand existing patterns, types, and conventions before
      proposing steps.

      ### 4. Assess the current plan
      Determine whether the issue already contains a solid implementation plan:
        - If YES: normalize it into a concise canonical step list. Do not invent
          a different plan. State explicitly that the existing plan is solid.
        - If NO or the plan is weak/ambiguous: create a new implementation plan.

      ### 5. Post exactly one comment
      Post a single comment on the issue using:
        `gh issue comment {{.Number}} --body "..."`

      Format the comment as:

      ```
      ## Plan Assessment

      <Brief assessment of the issue definition and any gaps>

      ## Implementation Steps

      1. <Step 1 — concrete, actionable, with file paths where relevant>
      2. <Step 2>
      ...

      ## Acceptance Criteria

      - [ ] <Criterion 1>
      - [ ] <Criterion 2>
      ...

      ## Open Questions & Risks

      - <Question or risk, if any — or "None identified">

      /kelos needs-input
      ```

      ## Rules

      - Do NOT open PRs, push code, or modify any files
      - Do NOT change labels or assignees
      - Do NOT trigger other automation (except the `/kelos needs-input` line above)
      - Post exactly one comment per run
      - The comment MUST end with a standalone `/kelos needs-input` line
  pollInterval: 1m

# WebhookGateway authenticates GitHub webhook deliveries for the kelos-dev/kelos
# repository and routes them to the self-development TaskSpawners that reference
# it via githubWebhook.gatewayRef. It replaces the legacy per-source webhook
# server for these spawners.
#
# Apply this in the same namespace as the TaskSpawners. The gateway's inbound
# path is /webhook/<namespace>/kelos (surfaced in status.path); point the
# repository webhook at it.
apiVersion: kelos.dev/v1alpha1
kind: WebhookGateway
metadata:
  name: kelos
spec:
  github:
    # HMAC secret shared with the GitHub repository webhook. The Secret must
    # hold the value under a "webhook-secret" key.
    secretRef:
      name: github-webhook-secret
    # Outbound GitHub API credentials for PR-file enrichment and status
    # reporting (these spawners enable reporting/checks). A PAT under the
    # GITHUB_TOKEN key, or GitHub App keys (appID, installationID, privateKey).
    # The credential needs repo and checks:write.
    credentialsRef:
      name: github-token

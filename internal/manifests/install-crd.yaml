apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cert-manager.io/inject-ca-from: kelos-system/kelos-serving-cert
    controller-gen.kubebuilder.io/version: v0.20.0
  name: tasks.kelos.dev
spec:
  group: kelos.dev
  names:
    kind: Task
    listKind: TaskList
    plural: tasks
    singular: task
  scope: Namespaced
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: kelos-webhook
          namespace: kelos-system
          path: /convert
          port: 443
      conversionReviewVersions:
        - v1
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.branch
      name: Branch
      priority: 1
      type: string
    - jsonPath: .spec.dependsOn
      name: Depends On
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    deprecated: true
    deprecationWarning: kelos.dev/v1alpha1 is deprecated; use kelos.dev/v1alpha2
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Task is the Schema for the tasks API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TaskSpec defines the desired state of Task.
            properties:
              agentConfigRef:
                description: AgentConfigRef references an AgentConfig resource.
                properties:
                  name:
                    description: Name is the name of the AgentConfig resource.
                    type: string
                required:
                - name
                type: object
              agentConfigRefs:
                description: |-
                  AgentConfigRefs references an ordered list of AgentConfig resources.
                  Configs are merged in order: agentsMD is concatenated, plugins/skills
                  are appended, mcpServers are appended with later entries winning on
                  name collision. Mutually exclusive with AgentConfigRef.
                items:
                  description: AgentConfigReference refers to an AgentConfig resource
                    by name.
                  properties:
                    name:
                      description: Name is the name of the AgentConfig resource.
                      type: string
                  required:
                  - name
                  type: object
                minItems: 1
                type: array
              branch:
                description: |-
                  Branch is the git branch this Task works on. When set, an init
                  container checks out this branch before the agent starts. The
                  controller ensures only one Task with the same Branch value
                  runs at a time for the same workspace.
                type: string
              credentials:
                description: Credentials specifies how to authenticate with the agent.
                properties:
                  secretRef:
                    description: |-
                      SecretRef references the Secret containing credentials.
                      Required for api-key and oauth types. Not used with none.
                    properties:
                      name:
                        description: Name is the name of the secret.
                        type: string
                    required:
                    - name
                    type: object
                  type:
                    description: Type specifies the credential type.
                    enum:
                    - api-key
                    - oauth
                    - none
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - message: secretRef is required for api-key and oauth credential
                    types
                  rule: self.type == 'none' || has(self.secretRef)
              dependsOn:
                description: DependsOn lists Task names that must succeed before this
                  Task starts.
                items:
                  type: string
                type: array
              effort:
                description: |-
                  Effort optionally controls how much reasoning effort the agent should use.
                  Values are agent-specific and passed through without validation.
                type: string
              image:
                description: |-
                  Image optionally overrides the default agent container image.
                  Custom images must implement the agent image interface
                  (see docs/agent-image-interface.md).
                type: string
              model:
                description: Model optionally overrides the default model.
                type: string
              podOverrides:
                description: PodOverrides allows customizing the agent pod configuration.
                properties:
                  activeDeadlineSeconds:
                    description: |-
                      ActiveDeadlineSeconds specifies the maximum duration in seconds
                      that the agent pod can run before being terminated.
                      This is set on the Job's activeDeadlineSeconds field.
                    format: int64
                    minimum: 1
                    type: integer
                  affinity:
                    description: |-
                      Affinity specifies node, pod, and pod-anti affinity rules for the
                      agent pod. Useful for spreading agents across nodes (anti-affinity)
                      or expressing scheduling preferences beyond simple NodeSelector.
                    properties:
                      nodeAffinity:
                        description: Describes node affinity scheduling rules for
                          the pod.
                        properties:
                          preferredDuringSchedulingIgnoredDuringExecution:
                            description: |-
                              The scheduler will prefer to schedule pods to nodes that satisfy
                              the affinity expressions specified by this field, but it may choose
                              a node that violates one or more of the expressions. The node that is
                              most preferred is the one with the greatest sum of weights, i.e.
                              for each node that meets all of the scheduling requirements (resource
                              request, requiredDuringScheduling affinity expressions, etc.),
                              compute a sum by iterating through the elements of this field and adding
                              "weight" to the sum if the node matches the corresponding matchExpressions; the
                              node(s) with the highest sum are the most preferred.
                            items:
                              description: |-
                                An empty preferred scheduling term matches all objects with implicit weight 0
                                (i.e. it's a no-op). A null preferred scheduling term matches no objects (i.e. is also a no-op).
                              properties:
                                preference:
                                  description: A node selector term, associated with
                                    the corresponding weight.
                                  properties:
                                    matchExpressions:
                                      description: A list of node selector requirements
                                        by node's labels.
                                      items:
                                        description: |-
                                          A node selector requirement is a selector that contains values, a key, and an operator
                                          that relates the key and values.
                                        properties:
                                          key:
                                            description: The label key that the selector
                                              applies to.
                                            type: string
                                          operator:

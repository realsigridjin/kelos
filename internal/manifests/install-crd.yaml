                              > 0)
                        type: array
                      source:
                        description: |-
                          Source is a short identifier for this webhook source (e.g., "notion",
                          "sentry", "drata"). It determines the URL path: /webhook/<source>.
                          Must be lowercase alphanumeric with optional hyphens.
                        pattern: ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$
                        type: string
                    required:
                    - fieldMapping
                    - source
                    type: object
                    x-kubernetes-validations:
                    - message: fieldMapping must include an 'id' key for deduplication
                        and task naming
                      rule: '''id'' in self.fieldMapping'
                type: object
            required:
            - taskTemplate
            - when
            type: object
            x-kubernetes-validations:
            - message: taskTemplate.workspaceRef is required when using githubIssues,
                githubPullRequests, githubWebhook, or linearWebhook source
              rule: '!(has(self.when.githubIssues) || has(self.when.githubPullRequests)
                || has(self.when.githubWebhook) || has(self.when.linearWebhook)) ||
                has(self.taskTemplate.workspaceRef)'
          status:
            description: TaskSpawnerStatus defines the observed state of TaskSpawner.
            properties:
              activeTasks:
                description: ActiveTasks is the number of currently active (non-terminal)
                  Tasks.
                type: integer
              conditions:
                description: Conditions provides detailed status information.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.

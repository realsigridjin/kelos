apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cert-manager.io/inject-ca-from: kelos-system/kelos-serving-cert
    controller-gen.kubebuilder.io/version: v0.20.0
  name: taskspawners.kelos.dev
spec:
  group: kelos.dev
  names:
    kind: TaskSpawner
    listKind: TaskSpawnerList
    plural: taskspawners
    singular: taskspawner
  scope: Namespaced
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: kelos-webhook
          namespace: kelos-system
          path: /convert
          port: 443
      conversionReviewVersions:
        - v1
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.taskTemplate.workspaceRef.name
      name: Workspace
      type: string
    - jsonPath: .spec.suspend
      name: Suspend
      type: boolean
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.activeTasks

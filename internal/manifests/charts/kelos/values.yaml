crds:
  install: true
  keep: true

image:
  tag: "latest"
  pullPolicy: ""

telemetry:
  enabled: true

# codexAuthRefresher lets the controller manage one scheduled Codex-image
# CronJob in the target namespace per Secret labeled
# kelos.dev/codex-oauth-refresh=true, keeping Codex OAuth credentials valid even
# when no agent task runs for a while.
codexAuthRefresher:
  schedule: "0 */6 * * *"

controllerImage: ghcr.io/kelos-dev/kelos-controller
ghproxy:
  image: ghcr.io/kelos-dev/ghproxy
  allowedUpstreams: "https://api.github.com"
  cacheTTL: ""
  resources:
    requests: ""
    limits: ""
claudeCodeImage: ghcr.io/kelos-dev/claude-code
codexImage: ghcr.io/kelos-dev/codex
geminiImage: ghcr.io/kelos-dev/gemini
opencodeImage: ghcr.io/kelos-dev/opencode
cursorImage: ghcr.io/kelos-dev/cursor
spawner:
  image: ghcr.io/kelos-dev/kelos-spawner
  resources:
    requests: ""
    limits: ""
controller:
  resources:
    requests: {}
    limits: {}
webhookServer:
  image: ghcr.io/kelos-dev/kelos-webhook-server
  sources:
    github:
      enabled: false
      replicas: 1
      secretName: ""
      githubSecretName: ""
      service:
        # Service type for the webhook endpoint.
        # Allowed values: ClusterIP, LoadBalancer, NodePort.
        # When type is ClusterIP, the Service also exposes the unauthenticated
        # metrics port (8080) for in-cluster scraping. When type is
        # LoadBalancer or NodePort, only the webhook port (8443) is exposed
        # to avoid externally publishing the metrics endpoint; scrape metrics
        # via a PodMonitor or a separate ClusterIP Service in that case.
        type: ClusterIP
    linear:
      enabled: false
      replicas: 1
      secretName: ""
      apiKeySecretName: ""
      service:
        # Service type for the webhook endpoint.
        # Allowed values: ClusterIP, LoadBalancer, NodePort.
        # When type is ClusterIP, the Service also exposes the unauthenticated
        # metrics port (8080) for in-cluster scraping. When type is
        # LoadBalancer or NodePort, only the webhook port (8443) is exposed
        # to avoid externally publishing the metrics endpoint; scrape metrics
        # via a PodMonitor or a separate ClusterIP Service in that case.
        type: ClusterIP
    generic:
      enabled: false
      replicas: 1
      # Name of a Secret containing per-source HMAC keys as individual keys.
      # Each key should be named <SOURCE>_WEBHOOK_SECRET (e.g.,
      # NOTION_WEBHOOK_SECRET, SENTRY_WEBHOOK_SECRET).
      secretName: ""
      service:
        # Service type for the webhook endpoint.
        # Allowed values: ClusterIP, LoadBalancer, NodePort.
        # When type is ClusterIP, the Service also exposes the unauthenticated
        # metrics port (8080) for in-cluster scraping. When type is
        # LoadBalancer or NodePort, only the webhook port (8443) is exposed
        # to avoid externally publishing the metrics endpoint; scrape metrics
        # via a PodMonitor or a separate ClusterIP Service in that case.
        type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}
    tls:
      enabled: false
      secretName: ""
  gateway:
    enabled: false
    gatewayClassName: ""
    gatewayName: "kelos-webhook-gateway"
    host: ""
    annotations: {}
    tls:
      enabled: false
      certificateRefs: []
slackServer:
  enabled: false
  image: ghcr.io/kelos-dev/kelos-slack-server
  replicas: 1
  secretName: ""
  # Message posted when the bot joins a channel. Leave empty to disable.
  joinMessage: ""
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

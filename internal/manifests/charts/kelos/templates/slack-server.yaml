{{- if .Values.slackServer.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kelos-slack-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: slack-server
spec:
  replicas: {{ .Values.slackServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kelos
      app.kubernetes.io/component: slack-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kelos
        app.kubernetes.io/component: slack-server
    spec:
      serviceAccountName: kelos-slack-server
      securityContext:
        runAsNonRoot: true
      containers:
        - name: slack-server
          image: {{ .Values.slackServer.image }}{{- if .Values.image.tag }}:{{ .Values.image.tag }}{{- end }}
          {{- if .Values.image.pullPolicy }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- end }}
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            {{- if .Values.slackServer.denySlackConnectChannels }}
            - --deny-slack-connect-channels
            {{- end }}
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slackServer.secretName }}
                  key: SLACK_BOT_TOKEN
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slackServer.secretName }}
                  key: SLACK_APP_TOKEN
            {{- if .Values.slackServer.joinMessage }}
            - name: SLACK_JOIN_MESSAGE_FILE
              value: /etc/kelos/join-message.txt
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if .Values.slackServer.resources }}
          resources:
            {{- toYaml .Values.slackServer.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.slackServer.joinMessage }}
          volumeMounts:
            - name: config
              mountPath: /etc/kelos
              readOnly: true
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - "ALL"
      {{- if .Values.slackServer.joinMessage }}
      volumes:
        - name: config
          configMap:
            name: kelos-slack-server-config
      {{- end }}
{{- end }}

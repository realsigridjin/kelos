{{- if .Values.sessionServer.enabled }}
{{- $secretName := required "sessionServer.secretName is required when sessionServer.enabled=true" .Values.sessionServer.secretName }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kelos-session-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: session-server
spec:
  replicas: {{ .Values.sessionServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kelos
      app.kubernetes.io/component: session-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kelos
        app.kubernetes.io/component: session-server
    spec:
      serviceAccountName: kelos-session-server
      securityContext:
        runAsNonRoot: true
      containers:
        - name: session-server
          image: {{ .Values.sessionServer.image }}{{- if .Values.image.tag }}:{{ .Values.image.tag }}{{- end }}
          {{- if .Values.image.pullPolicy }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- end }}
          args:
            - --bind-address=:8080
            - --token-file=/var/run/secrets/kelos-session/token
            - --default-namespace={{ .Values.sessionServer.defaultNamespace }}
            {{- if .Values.sessionServer.secureCookie }}
            - --secure-cookie
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: auth-token
              mountPath: /var/run/secrets/kelos-session
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.sessionServer.resources | nindent 12 }}
      volumes:
        - name: auth-token
          secret:
            secretName: {{ $secretName }}
            items:
              - key: {{ .Values.sessionServer.tokenKey }}
                path: token
---
apiVersion: v1
kind: Service
metadata:
  name: kelos-session-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: session-server
spec:
  type: {{ .Values.sessionServer.service.type }}
  selector:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: session-server
  ports:
    - name: http
      port: {{ .Values.sessionServer.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}

{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
    {{- if .Values.crds.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
  name: webhookgateways.kelos.dev
spec:
  group: kelos.dev
  names:
    kind: WebhookGateway
    listKind: WebhookGatewayList
    plural: webhookgateways
    singular: webhookgateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.url
      name: URL
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WebhookGateway is the Schema for the webhookgateways API. It is a per-channel
          authentication and routing boundary for webhook-driven TaskSpawners: it owns
          one inbound path (/webhook/<namespace>/<name>) and, for github/linear, the
          secret used to verify deliveries, then fans out to TaskSpawners in its own
          namespace that reference it via gatewayRef.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WebhookGatewaySpec defines the desired state of a WebhookGateway.
            properties:
              apiBaseURL:
                description: |-
                  APIBaseURL is the GitHub API base URL used for outbound API calls (pull
                  request file enrichment and status reporting), e.g.
                  "https://ghe.example.com/api/v3" for a GitHub Enterprise instance. When
                  empty, "https://api.github.com" is used. Only valid for github gateways.
                type: string
              credentialsRef:
                description: |-
                  CredentialsRef references a Secret holding GitHub API credentials (a
                  personal access token or GitHub App credentials) used for outbound API
                  calls. Only valid for github gateways.
                properties:
                  name:
                    description: Name is the name of the secret.
                    type: string
                required:
                - name
                type: object
              secretRef:
                description: |-
                  SecretRef references a Secret holding the HMAC secret used to verify
                  inbound deliveries. Required for github and linear gateways. Unused for
                  generic gateways, which are accepted without verification in this version.
                properties:
                  name:
                    description: Name is the name of the secret.
                    type: string
                required:
                - name
                type: object
              type:
                description: |-
                  Type identifies the webhook source this gateway serves. It selects the
                  signature scheme used to verify inbound deliveries.
                enum:
                - github
                - linear
                - generic
                type: string
            required:
            - type
            type: object
            x-kubernetes-validations:
            - message: secretRef is required for github and linear gateways
              rule: self.type == 'generic' || has(self.secretRef)
            - message: apiBaseURL and credentialsRef are only valid for github gateways
              rule: (!has(self.apiBaseURL) && !has(self.credentialsRef)) || self.type
                == 'github'
          status:
            description: WebhookGatewayStatus defines the observed state of a WebhookGateway.
            properties:
              message:
                description: Message provides additional information about the current
                  status.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: Phase summarizes the gateway's authentication state.
                type: string
              url:
                description: |-
                  URL is the inbound path this gateway listens on, derived as
                  /webhook/<namespace>/<name>. It is relative to the externally configured
                  webhook host.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}

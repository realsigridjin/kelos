---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: kelos-system/kelos-serving-cert
  name: kelos-validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: kelos-webhook
      namespace: kelos-system
      path: /validate-kelos-dev-v1alpha2-taskbudget
      port: 443
  failurePolicy: Fail
  name: vtaskbudget.kelos.dev
  rules:
  - apiGroups:
    - kelos.dev
    apiVersions:
    - v1alpha2
    operations:
    - CREATE
    - UPDATE
    resources:
    - taskbudgets
  sideEffects: None

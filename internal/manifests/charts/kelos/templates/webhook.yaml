---
# Self-signed issuer used only to mint the webhook serving certificate.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kelos-selfsigned-issuer
  namespace: kelos-system
  labels:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: manager
spec:
  selfSigned: {}
---
# Serving certificate for the kelos CRD conversion webhook (shared by all
# kelos CRDs). cert-manager stores it in the kelos-webhook-server-cert Secret
# and, via the cert-manager.io/inject-ca-from annotation on each kelos CRD,
# injects the CA bundle into the CRD's conversion clientConfig.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kelos-serving-cert
  namespace: kelos-system
  labels:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: manager
spec:
  dnsNames:
    - kelos-webhook.kelos-system.svc
    - kelos-webhook.kelos-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: kelos-selfsigned-issuer
  secretName: kelos-webhook-server-cert
---
# Service the API server uses to reach the conversion webhook on the controller.
apiVersion: v1
kind: Service
metadata:
  name: kelos-webhook
  namespace: kelos-system
  labels:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: manager
spec:
  selector:
    app.kubernetes.io/name: kelos
    app.kubernetes.io/component: manager
    # Only pods that actually serve the webhook on 9443 carry this label, so an
    # old controller pod lingering during a rolling upgrade is never selected.
    kelos.dev/conversion-webhook: "true"
  ports:
    - name: webhook
      port: 443
      targetPort: 9443
      protocol: TCP

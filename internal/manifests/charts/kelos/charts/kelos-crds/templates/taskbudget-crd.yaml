apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
    {{- if .Values.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
  name: taskbudgets.kelos.dev
spec:
  group: kelos.dev
  names:
    kind: TaskBudget
    listKind: TaskBudgetList
    plural: taskbudgets
    shortNames:
    - tb
    singular: taskbudget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.period.type
      name: Period
      type: string
    - jsonPath: .spec.maxCostUSD
      name: Max Cost
      priority: 1
      type: string
    - jsonPath: .status.used.costUSD
      name: Used Cost
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          TaskBudget defines observed-spend admission limits for Tasks.
          When a Task's labels match a TaskBudget's taskSelector and the budget
          is exceeded, the Task stays in Waiting phase with a BudgetBlocked
          condition until the period resets.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Spec is required. A spec-less TaskBudget would decode to an empty selector
              (matching all Tasks) and an empty period, which fails closed and blocks
              Task admission for the whole namespace.
            properties:
              maxCostUSD:
                anyOf:
                - type: integer
                - type: string
                description: MaxCostUSD is the maximum observed completed-task cost
                  admitted in the period.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
                x-kubernetes-validations:
                - message: maxCostUSD must be non-negative
                  rule: 'type(self) == int ? self >= 0 : !quantity(self).isLessThan(quantity(''0''))'
              maxInputTokens:
                description: MaxInputTokens is the maximum observed input tokens admitted
                  in the period.
                format: int64
                minimum: 0
                type: integer
              maxOutputTokens:
                description: MaxOutputTokens is the maximum observed output tokens
                  admitted in the period.
                format: int64
                minimum: 0
                type: integer
              period:
                description: Period defines the accounting window for this budget.
                properties:
                  timezone:
                    default: UTC
                    description: |-
                      Timezone is the IANA timezone used to compute period boundaries.
                      Defaults to UTC. The XValidation rule rejects names that the controller
                      cannot load (getHours errors on an unknown IANA zone), so an invalid
                      timezone cannot be stored and fail closed at admission.
                    maxLength: 64
                    pattern: ^[A-Za-z0-9/_+-]+$
                    type: string
                    x-kubernetes-validations:
                    - message: timezone must be a valid IANA time zone
                      rule: timestamp('2000-01-01T00:00:00Z').getHours(self) >= 0
                  type:
                    description: Type is the period boundary used for budget accounting.
                    enum:
                    - Daily
                    type: string
                required:
                - type
                type: object
              taskSelector:
                description: |-
                  TaskSelector selects Tasks and TaskRecords in the same namespace.
                  An empty selector ({}) selects all Tasks in the namespace.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - period
            - taskSelector
            type: object
            x-kubernetes-validations:
            - message: at least one of maxCostUSD, maxInputTokens, or maxOutputTokens
                must be set
              rule: has(self.maxCostUSD) || has(self.maxInputTokens) || has(self.maxOutputTokens)
          status:
            description: TaskBudgetStatus tracks the current accounting period and
              usage.
            properties:
              conditions:
                description: Conditions provides detailed status information.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentPeriodEnd:
                description: CurrentPeriodEnd is the exclusive end of the current
                  accounting period.
                format: date-time
                type: string
              currentPeriodStart:
                description: CurrentPeriodStart is the inclusive start of the current
                  accounting period.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              used:
                description: Used contains usage summed from matching TaskRecords
                  in the current period.
                properties:
                  costUSD:
                    anyOf:
                    - type: integer
                    - type: string
                    description: CostUSD is the reported agent cost in USD.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                    x-kubernetes-validations:
                    - message: costUSD must be non-negative
                      rule: 'type(self) == int ? self >= 0 : !quantity(self).isLessThan(quantity(''0''))'
                  inputTokens:
                    description: InputTokens is the number of input tokens consumed.
                    format: int64
                    minimum: 0
                    type: integer
                  outputTokens:
                    description: OutputTokens is the number of output tokens produced.
                    format: int64
                    minimum: 0
                    type: integer
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

apiVersion: kelos.dev/v1alpha2
kind: TaskSpawner
metadata:
  name: agents-test-health
spec:
  when:
    cron:
      schedule: "0 0 * * *" # daily 00:00 UTC (09:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRefs:
      - name: kelos-dev-agent
    branch: kelos/agents-test-health
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      Daily test-health check for the Planner Agent service (service/agents) in the pai/ml monorepo.

      Keep service/agents tests green. Run the project's CI test command; if anything is broken or
      flaky, fix it with the SMALLEST possible change and open/update a single rolling PR. If
      everything passes, exit cleanly WITHOUT creating a PR, branch, or comment.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/agents

      ## Step 1 — Run tests (exactly what CI runs)
      ./ci_test.sh      # -> uv run pytest tests/ -v -m "not stage and not e2e_fixme"
      Capture the full output.

      ## Step 2 — Decide
      - All tests pass: report "service/agents tests green" and EXIT. No branch/PR/comment.
      - Failures: continue.

      ## Step 3 — Rolling PR
      gh pr list --head kelos/agents-test-health --state open
      - If a PR exists: check out the branch, `git rebase origin/develop`, read the existing diff and
        comments, and build on the existing work — do NOT start over.
      - If not: create branch kelos/agents-test-health from origin/develop.

      ## Step 4 — Fix
      - Diagnose each failure: real regression in service/agents code vs. flaky/environment issue.
      - Apply the smallest fix that makes ./ci_test.sh pass. Follow service/agents/CLAUDE.md and
        AGENTS.md (state changes via EventActions.state_delta; dependency injection; AgentIO
        contracts in state.py). No opportunistic refactors. Re-run ./ci_test.sh until it passes.

      ## Step 5 — Open/update the PR
      - Commit (commit skill) and push origin kelos/agents-test-health.
      - Create or update ONE PR targeting develop (pull-request skill; Korean description).
      - Label it: gh pr edit <number> --add-label gjkim/auto-generated
      - /review the PR; address findings; repeat until it passes.
      - Poll CI: gh pr checks <number> (do NOT redirect stderr). 0 -> done; 8 -> pending, sleep 30s
        and retry up to ~15 min; any other code -> post `/kelos needs-input` with the error and exit.

      ## Rules
      - Only touch files under service/agents.
      - If a failure is purely environmental (missing internal CA bundle, no network, missing secret)
        and NOT a code bug, do not hack around it: post `/kelos needs-input` on the PR — or, if no PR
        exists, manage the single open issue owned by this TaskSpawner:
          MANAGED_TITLE_PREFIX='[service/agents] [agents-test-health]'
          gh issue list --label gjkim/auto-generated --state open \
            --search "\"${MANAGED_TITLE_PREFIX}\" in:title" --json number,title,url
          gh issue list --label gjkim/auto-generated --state all \
            --search '"[service/agents]" in:title' --limit 200
        If another issue already covers the environment gap, do not file or replace anything. Otherwise,
        create the managed issue if it is missing, or replace it with `gh issue edit` only when the new
        gap is clearly more actionable than the current one. Every managed issue title MUST start with
        `[service/agents] [agents-test-health]`; use `--body-file` for create/edit and include
        "Managed by TaskSpawner: agents-test-health" in the body. Do not create a second open issue for
        this TaskSpawner.


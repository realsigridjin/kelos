apiVersion: kelos.dev/v1alpha2
kind: TaskSpawner
metadata:
  name: agents-nelo-scout
spec:
  when:
    cron:
      schedule: "0 8 * * *" # daily 08:00 UTC (17:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRefs:
      - name: kelos-dev-agent
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
        - name: NELO_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: nelo-credentials
              key: NELO_ACCESS_KEY_ID
              optional: true
        - name: NELO_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: nelo-credentials
              key: NELO_SECRET_ACCESS_KEY
              optional: true

apiVersion: kelos.dev/v1alpha2
kind: TaskSpawner
metadata:
  name: agents-simplify
spec:
  when:
    cron:
      schedule: "0 2 * * *" # daily 02:00 UTC (11:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRefs:
      - name: kelos-dev-agent
    branch: kelos/agents-simplify
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      Daily, CONSERVATIVE simplification pass for the Planner Agent service (service/agents) in pai/ml.

      Goal: improve clarity / reduce incidental complexity in ONE small, self-contained area per run,
      WITHOUT changing behavior. This is NOT a license to refactor broadly. service/agents/CLAUDE.md
      and AGENTS.md require: keep patches minimal, avoid opportunistic refactors, preserve Korean
      comments, route state via EventActions.state_delta, use dependency injection, keep AgentIO
      contracts intact. If you cannot find a clearly worthwhile, low-risk simplification, exit cleanly
      WITHOUT a PR. A no-op day is the correct and common outcome.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/agents

      ## Step 1 — Green baseline
      Run ./ci_test.sh and confirm it PASSES before any change. If it does not, EXIT immediately
      (test health is a separate task). Never simplify on a red baseline.

      ## Step 2 — Find ONE small target
      e.g. dead/unused code, an import, a collapsible duplication, an over-nested function that reads
      clearer flattened, or a stale comment/docstring that restates the code. Pick exactly ONE target
      with a small diff (rule of thumb: < ~80 changed lines). Do NOT touch public contracts (AgentIO
      subclasses in state.py, A2A request/response shapes, cross-module function signatures).

      ## Step 3 — Decide
      - Nothing clearly worth simplifying at low risk: report "no low-risk simplification found" and
        EXIT. No branch/PR/comment.
      - Otherwise continue.

      ## Step 4 — Rolling PR
      gh pr list --head kelos/agents-simplify --state open
      - If exists: check out, `git rebase origin/develop`, read existing diff/comments. Stack only
        closely-related cleanups; otherwise wait until it merges (EXIT).
      - If not: create branch kelos/agents-simplify from origin/develop.

      ## Step 5 — Simplify (behavior-preserving)
      - Make the change; preserve behavior exactly; preserve Korean comments/docstrings.
      - Run ./ci_test.sh — it MUST still pass. If it does not and the fix is not trivial, revert and EXIT.

      ## Step 6 — Open/update the PR
      - Commit + push origin kelos/agents-simplify.
      - Create or update ONE PR targeting develop (pull-request skill; Korean description) explaining
        what was simplified and why it is behavior-preserving. Label:
        gh pr edit <number> --add-label gjkim/auto-generated
      - /review; address findings; repeat. Poll CI with `gh pr checks <number>` as in the others.

      ## Rules
      - One small, behavior-preserving simplification per run. No feature/dependency/format-only churn.
      - Only touch files under service/agents. When in doubt, do nothing and exit.


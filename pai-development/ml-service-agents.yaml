apiVersion: kelos.dev/v1alpha2
kind: TaskSpawner
metadata:
  name: agents-bug-scout
spec:
  when:
    cron:
      schedule: "0 3 * * *" # daily 03:00 UTC (12:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRefs:
      - name: kelos-dev-agent
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      Daily bug-scout for the Planner Agent service (service/agents) in the pai/ml monorepo.

      Hunt for LATENT, high-confidence correctness bugs and maintain this TaskSpawner's single managed
      GitHub issue for human triage. You do NOT change code, open PRs, or change any label other than
      the one below. If you find nothing genuinely worth filing, exit cleanly WITHOUT creating an issue
      — a no-op day is a good outcome. Precision over recall: do not file speculative noise.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/agents

      ## Step 1 — Investigate
      Read the code under service/agents/src and tests. Look for real defects, e.g.:
      - state mutated directly instead of via Event(actions=EventActions(state_delta=...))
        (forbidden by CLAUDE.md — silently drops state across turns / races under multiprocess)
      - AgentIO contract misuse: addressing a slot by raw string key, missing from_state/to_state
      - error/exception paths that swallow failures, missing timeouts, unawaited coroutines
      - off-by-one / None-handling / boundary bugs; incorrect async usage
      - dependency-injection violations (os.getenv fallbacks inside __init__, module-level env reads)
      Back every finding with a concrete file:line and a plausible failure scenario.

      ## Step 2 — Deduplicate and find this spawner's managed issue (REQUIRED)
      Run:
        MANAGED_TITLE_PREFIX='[service/agents] [agents-bug-scout]'
        gh issue list --label gjkim/auto-generated --state open \
          --search "\"${MANAGED_TITLE_PREFIX}\" in:title" --json number,title,url
        gh issue list --label gjkim/auto-generated --state all \
          --search '"[service/agents]" in:title' --limit 200
      Drop any finding already covered by an open or recently-closed issue. Then rank the remaining
      findings by severity × confidence and keep only the best one.

      ## Step 3 — Create or replace the managed issue
      - If nothing meets the bar, report "no high-confidence bugs found" and EXIT without filing.
      - If no open managed issue exists, create exactly one issue assigned to gunju-kim with label
        gjkim/auto-generated. Its title MUST start with
        `[service/agents] [agents-bug-scout]`.
      - If an open managed issue exists, compare it to the best current finding. Replace it with
        `gh issue edit <number> --title ... --body-file ...` only when the current finding is clearly
        more severe/actionable or makes the existing issue obsolete. Otherwise leave the issue unchanged.
      - The issue body MUST include "Managed by TaskSpawner: agents-bug-scout", what is wrong, why it is
        a bug, file:line refs, a failure scenario, and a suggested direction. End with: "Comment /kelos
        plan to plan a fix, or /kelos pick-up to fix."
      - Do not create a second open issue for this TaskSpawner. If multiple managed issues already
        exist, keep the best one and close the extras as superseded.

      ## Rules
      - Read-only on code: do NOT modify files, open PRs, or change other labels/assignees.
      - Only investigate service/agents.

---

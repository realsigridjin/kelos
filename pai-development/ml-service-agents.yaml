apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: agents-io-contract-sync
spec:
  when:
    cron:
      schedule: "0 1 * * *" # daily 01:00 UTC (10:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRef:
      name: kelos-dev-agent
    branch: kelos/agents-io-contract-sync
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      Daily contract-doc drift check for the Planner Agent service (service/agents) in pai/ml.

      Per service/agents/CLAUDE.md, every cross-agent slot is a typed AgentIO contract in
      src/place_agents/state.py, and the catalogue + per-turn flow diagram in IO.md MUST stay in sync
      with it ("drift between the two is a smell"). api.md documents the A2A wire spec. CODE IS THE
      SOURCE OF TRUTH. Update the DOCS to match the code. If there is no drift, exit WITHOUT a PR.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/agents

      ## Step 1 — Inventory contracts from code
      - Read src/place_agents/state.py. Enumerate every AgentIO subclass: fields/types, producer,
        consumers, scope, lifecycle.
      - Grep from_state / to_state / state_delta usages to confirm each contract's producer/consumers.

      ## Step 2 — Compare against docs
      - IO.md: is every contract listed, with correct fields, producer, consumers, scope, lifecycle,
        and per-turn flow-diagram edges?
      - api.md: does the documented A2A request/response shape still match src/place_agents/a2a/*?
      - Produce a concrete drift list (missing/renamed/added/removed fields, wrong producer/consumer,
        stale diagram edges, stale api.md fields).

      ## Step 3 — Decide
      - No drift: report "IO.md / api.md in sync with state.py" and EXIT. No branch/PR/comment.
      - Drift: continue.

      ## Step 4 — Rolling PR
      gh pr list --head kelos/agents-io-contract-sync --state open
      - If exists: check out, `git rebase origin/develop`, read existing diff/comments, build on it.
      - If not: create branch kelos/agents-io-contract-sync from origin/develop.

      ## Step 5 — Fix the DOCS only
      - Update IO.md (and api.md) to match the code exactly, including the per-turn flow diagram.
      - Do NOT modify state.py or any other code. Preserve existing Korean text; do not translate.

      ## Step 6 — Open/update the PR
      - Commit + push origin kelos/agents-io-contract-sync.
      - Create or update ONE PR targeting develop (pull-request skill; Korean description) listing the
        drift fixed. Label: gh pr edit <number> --add-label gjkim/auto-generated
      - /review; address; repeat. Poll CI with `gh pr checks <number>` as in agents-test-health.

      ## Rules
      - Docs-only changes (IO.md, api.md, docs). Only touch files under service/agents.
      - If you find the CODE is actually wrong (a real bug, not a doc gap), do NOT fix it here — open
        an issue only if the `[service/agents]` open issue cap allows it:
          MAX_OPEN_AUTO_ISSUES=10
          open_count=$(gh issue list --label gjkim/auto-generated --state open \
            --search '"[service/agents]" in:title' --json number --jq 'length')
          remaining_budget=$((MAX_OPEN_AUTO_ISSUES - open_count))
        If remaining_budget is 0 or less, report "service/agents auto-generated issue backlog is at cap"
        and exit without filing. Otherwise create one issue with title
        `[service/agents] <concise correctness bug title>` and label `gjkim/auto-generated`, then
        exclude it from this PR.


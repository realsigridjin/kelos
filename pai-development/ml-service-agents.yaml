apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: agents-bug-scout
spec:
  when:
    cron:
      schedule: "0 3 * * *" # daily 03:00 UTC (12:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRef:
      name: kelos-dev-agent
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      Daily bug-scout for the Planner Agent service (service/agents) in the pai/ml monorepo.

      Hunt for LATENT, high-confidence correctness bugs and file them as GitHub issues for human
      triage. You do NOT change code, open PRs, or change any label other than the one below. If you
      find nothing genuinely worth filing, exit cleanly WITHOUT creating an issue — a no-op day is a
      good outcome. Precision over recall: do not file speculative noise.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/agents

      ## Step 1 — Investigate
      Read the code under service/agents/src and tests. Look for real defects, e.g.:
      - state mutated directly instead of via Event(actions=EventActions(state_delta=...))
        (forbidden by CLAUDE.md — silently drops state across turns / races under multiprocess)
      - AgentIO contract misuse: addressing a slot by raw string key, missing from_state/to_state
      - error/exception paths that swallow failures, missing timeouts, unawaited coroutines
      - off-by-one / None-handling / boundary bugs; incorrect async usage
      - dependency-injection violations (os.getenv fallbacks inside __init__, module-level env reads)
      Back every finding with a concrete file:line and a plausible failure scenario.

      ## Step 2 — Deduplicate and enforce open-backlog cap (REQUIRED)
      List already-filed issues so you never refile:
        MAX_OPEN_AUTO_ISSUES=10
        open_count=$(gh issue list --label gjkim/auto-generated --state open \
          --search '"[service/agents]" in:title' --json number --jq 'length')
        remaining_budget=$((MAX_OPEN_AUTO_ISSUES - open_count))
        gh issue list --label gjkim/auto-generated --state all \
          --search '"[service/agents]" in:title' --limit 200
      Drop any finding already covered by an open or recently-closed issue.
      If remaining_budget is 0 or less, report "service/agents auto-generated issue backlog is at cap"
      and EXIT without filing.

      ## Step 3 — File the top findings (capped)
      - Rank remaining findings by severity × confidence. File AT MOST min(3, remaining_budget) this
        run (highest value).
      - For each, create one issue. Every issue title MUST start with "[service/agents]":
        gh issue create --assignee gunju-kim --label gjkim/auto-generated \
          --title "[service/agents] <concise bug title>" \
          --body "<what's wrong, why it's a bug, file:line refs, a failure scenario, and a suggested
                   direction. End with: 'Comment /kelos plan to plan a fix, or /kelos pick-up to fix.'>"
      - If nothing meets the bar, report "no high-confidence bugs found" and EXIT without filing.

      ## Rules
      - Read-only on code: do NOT modify files, open PRs, or change other labels/assignees.
      - Only investigate service/agents.

---
apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: agents-improvement-scout
spec:
  when:
    cron:
      schedule: "0 4 * * *" # daily 04:00 UTC (13:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRef:
      name: kelos-dev-agent
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      Daily improvement-scout for the Planner Agent service (service/agents) in the pai/ml monorepo.

      Surface high-value POTENTIAL IMPROVEMENTS (not bugs) and file them as GitHub issues for human
      triage. You do NOT change code or open PRs. If nothing is clearly worth proposing, exit without
      filing. The mandatory dedup step + a per-run cap keep this from becoming noise.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/agents

      ## Step 1 — Look for improvements
      Read the code, tests, and docs under service/agents. Consider:
      - missing or weak test coverage on important paths (DST, planner routing, A2A boundary)
      - tech debt: overly complex modules, leaky abstractions, duplicated logic across packages
      - convention drift from CLAUDE.md / AGENTS.md (state_delta, DI, AgentIO contracts)
      - observability gaps (missing structured logs / metrics / traces on key events)
      - doc gaps (under-documented contracts or flows in IO.md / api.md / README)

      ## Step 2 — Deduplicate and enforce open-backlog cap (REQUIRED)
        MAX_OPEN_AUTO_ISSUES=10
        open_count=$(gh issue list --label gjkim/auto-generated --state open \
          --search '"[service/agents]" in:title' --json number --jq 'length')
        remaining_budget=$((MAX_OPEN_AUTO_ISSUES - open_count))
        gh issue list --label gjkim/auto-generated --state all \
          --search '"[service/agents]" in:title' --limit 200
      Drop anything already covered by an open or recently-closed issue.
      If remaining_budget is 0 or less, report "service/agents auto-generated issue backlog is at cap"
      and EXIT without filing.

      ## Step 3 — File the top proposals (capped)
      - Rank by impact ÷ effort (favor high-impact, low-effort). File AT MOST min(2, remaining_budget)
        this run.
      - For each:
        gh issue create --assignee gunju-kim --label gjkim/auto-generated \
          --title "[service/agents] <concise improvement title>" \
          --body "<the opportunity, why it matters, affected files, a concrete suggested approach, and
                   rough effort. End with: 'Comment /kelos plan to plan it, or /kelos pick-up to do it.'>"
      - If nothing clears the bar, report "no high-value improvements found" and EXIT without filing.

      ## Rules
      - Read-only on code: do NOT modify files, open PRs, or change other labels/assignees.
      - Only investigate service/agents. Favor a few high-value proposals over many small ones.

---
apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: agents-performance-scout
spec:
  when:
    cron:
      schedule: "0 7 * * *" # daily 07:00 UTC (16:00 KST)
  maxConcurrency: 1
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 86400
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRef:
      name: kelos-dev-agent
    podOverrides:
      env:
        - name: CLAUDE_CODE_EFFORT_LEVEL
          value: "max"
        - name: CLEANUP_AFTER_TEST
          value: "true"
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      Daily performance-scout for the Planner Agent service (service/agents) in the pai/ml monorepo.

      Surface high-confidence PERFORMANCE opportunities (latency, throughput, token/cost) on the
      request-handling path and file them as GitHub issues for human triage. You do NOT change code or
      open PRs. If nothing is clearly worth proposing, exit WITHOUT filing — a no-op day is a good
      outcome. The mandatory dedup step + a per-run cap keep this from becoming noise. Precision over
      recall: do not file speculative micro-optimizations with no measurable impact.

      ## Setup
      git fetch origin develop
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env
      cd service/agents

      ## Step 1 — Investigate hot paths
      Read the code under service/agents/src, focusing on the per-turn request path and A2A boundary.
      Look for genuine performance issues, e.g.:
      - independent async calls awaited sequentially that could run concurrently (asyncio.gather)
      - redundant or repeated LLM calls / recomputation that could be cached or hoisted
      - blocking/synchronous I/O on an async path (sync network/file calls, time.sleep, a sync client
        where an async one exists) that stalls the event loop
      - N+1 patterns: per-item network/LLM calls inside a loop that could be batched
      - expensive work repeated per request that could be done once at startup (model/config/file
        loads, recompiled regexes, re-parsed resources)
      - prompt/token bloat: unbounded history, oversized context, or duplicated content that inflates
        latency and cost
      - algorithmic hotspots / inefficient data structures on the request path
      Back every finding with a concrete file:line, why it is slow (the mechanism), and a rough estimate
      of the impact (per-request latency, fan-out, or token cost).

      ## Step 2 — Deduplicate and enforce open-backlog cap (REQUIRED)
        MAX_OPEN_AUTO_ISSUES=10
        open_count=$(gh issue list --label gjkim/auto-generated --state open \
          --search '"[service/agents]" in:title' --json number --jq 'length')
        remaining_budget=$((MAX_OPEN_AUTO_ISSUES - open_count))
        gh issue list --label gjkim/auto-generated --state all \
          --search '"[service/agents]" in:title' --limit 200
      Drop anything already covered by an open or recently-closed issue.
      If remaining_budget is 0 or less, report "service/agents auto-generated issue backlog is at cap"
      and EXIT without filing.

      ## Step 3 — File the top findings (capped)
      - Rank by impact × confidence. File AT MOST min(2, remaining_budget) this run, assigned to
        gunju-kim. Every issue title MUST start with "[service/agents]":
        gh issue create --assignee gunju-kim --label gjkim/auto-generated \
          --title "[service/agents] [perf] <concise performance opportunity title>" \
          --body "<what is slow and why (the mechanism), file:line refs, estimated impact, a concrete
                   suggested direction, and how the win could be measured. Note any behavior or
                   ordering risk. End with: 'Comment /kelos plan to plan it, or /kelos pick-up to do it.'>"
      - If nothing meets the bar, report "no high-confidence performance opportunities found" and EXIT.

      ## Rules
      - Read-only on code: do NOT modify files, open PRs, or change other labels/assignees.
      - Only investigate service/agents. Favor a few high-impact opportunities over many micro-tweaks.

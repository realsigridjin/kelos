      - missing or weak test coverage on important paths (DST, planner routing, A2A boundary)
      - tech debt: overly complex modules, leaky abstractions, duplicated logic across packages
      - convention drift from CLAUDE.md / AGENTS.md (state_delta, DI, AgentIO contracts)
      - observability gaps (missing structured logs / metrics / traces on key events)
      - doc gaps (under-documented contracts or flows in IO.md / api.md / README)


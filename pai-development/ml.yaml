apiVersion: kelos.dev/v1alpha1
kind: Workspace
metadata:
  name: ml-workspace
spec:
  ref: develop
  repo: https://oss.navercorp.com/pai/ml
  secretRef:
    name: kelos-bot
  setupCommand:
    - sh
    - -c
    - |
      set -eu
      curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-workers
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos pick-up"
          commentOn: "Issue"
      reporting:
        enabled: true
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    branch: "gjkim-kelos-task-{{.Number}}"
    agentConfigRef:
      name: kelos-dev-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are a coding agent. You handle issues triggered by `/kelos pick-up`.

      Issue #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      Pre-checklist:
      - Label any PR you create or update with "gjkim/auto-generated":
        - gh pr edit <number> --add-label gjkim/auto-generated

      Task:
      - 0. Set up your environment:
        ```
        git fetch origin develop
        curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env && uv tool install pre-commit && pre-commit install
        ```

      - 1. Kelos has already checked out branch gjkim-kelos-task-{{.Number}}. Rebase onto develop:
        ```
        git rebase origin/develop
        ```
      - 2. Check if a PR already exists for branch gjkim-kelos-task-{{.Number}}.

      If a PR already exists:
      - 3a. Read ALL review comments and conversation on the PR (gh pr view, gh api for review comments).
      - 4a. Read the existing diff (git diff develop...HEAD) to understand what has already been done. Do NOT start over or rewrite from scratch.
      - 5a. Make only the incremental changes needed to address review feedback or remaining issues. Preserve existing work.
      - 6a. Commit and push your changes to origin gjkim-kelos-task-{{.Number}}.
      - 7a. /review the PR to verify your changes address the feedback. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 8a. Update the PR title and description to reflect the final diff.
      - 9a. Poll CI status with `gh pr checks {{.Number}}` (do NOT redirect stderr — auth or network errors must surface). Interpret the exit code: 0 → all checks passed, continue; 8 → checks still pending, sleep 30s and retry (cap at 30 iterations / ~15 minutes); any other code → hard failure: stop polling, post a `/kelos needs-input` PR comment with the error output, and exit. Do not retry. On timeout, do the same: post `/kelos needs-input` with the latest check summary and exit.

      If no PR exists:
      - 3b. Investigate the issue #{{.Number}}.
      - 4b. Create a commit that fixes the issue.
      - 5b. Push your branch to origin gjkim-kelos-task-{{.Number}}.
      - 6b. Create a PR, then /review it. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 7b. Update the PR title and description to reflect the final diff.
      - 8b. Poll CI status with `gh pr checks {{.Number}}` (do NOT redirect stderr — auth or network errors must surface). Interpret the exit code: 0 → all checks passed, continue; 8 → checks still pending, sleep 30s and retry (cap at 30 iterations / ~15 minutes); any other code → hard failure: stop polling, post a `/kelos needs-input` PR comment with the error output, and exit. Do not retry. On timeout, do the same: post `/kelos needs-input` with the latest check summary and exit.

      Post-checklist:
      - Post a `/kelos needs-input` comment on the issue or PR and explain the reason if any of the following applies:
        - The PR is ready for review, please take a look.
        - Commented on the issue or the PR for more information.
        - You cannot make any progress, explain why.
      - If you find anything worth considering (e.g. bugs, improvements, follow-up work), create a new issue:
        - gh issue create --title "<title>" --body "<description>" --label gjkim/auto-generated

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-pr-responder
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
        - "pull_request_review"
        - "pull_request_review_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos pick-up"
          commentOn: "PullRequest"
        - event: "pull_request_review"
          action: "submitted"
          bodyContains: "/kelos pick-up"
        - event: "pull_request_review_comment"
          action: "created"
          bodyContains: "/kelos pick-up"
      reporting:
        enabled: true
        checks: {}
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    branch: "{{.Branch}}"
    agentConfigRef:
      name: kelos-dev-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are a coding agent updating an existing PR in response to `/kelos pick-up`.

      Pull request #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      Pre-checklist:
      - Label any PR you create or update with "gjkim/auto-generated":
        - gh pr edit <number> --add-label gjkim/auto-generated

      Task:
      - 0. Set up your environment:
        ```
        git fetch origin develop
        curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env && uv tool install pre-commit && pre-commit install
        ```
      - 1. Kelos has already checked out the PR head branch. Rebase onto develop before making changes:
        ```
        git rebase origin/develop
        ```
      - 2. Read ALL review comments and conversation on the PR (gh pr view, gh api for review comments).
      - 3. Read ALL comments on the linked issue referenced by the PR body. First determine the linked issue number from the PR body, then run `gh issue view <linked-issue-number> --comments`.
      - 4. Read the existing diff (git diff develop...HEAD) to understand what has already been done. Do NOT start over or rewrite from scratch.
      - 5. Make only the incremental changes needed to address review feedback or remaining issues. Preserve existing work. If there is nothing actionable to change, exit without code changes or comments.
      - 6. Commit and push your changes to origin on the PR head branch (use `git push origin HEAD`).
      - 7. /review the PR to verify your changes address the feedback. If changes are needed, make them, commit and push, then /review again. Repeat until the review passes.
      - 8. Update the PR title and description to reflect the final diff.
      - 9. Poll CI status with `gh pr checks {{.Number}}` (do NOT redirect stderr — auth or network errors must surface). Interpret the exit code: 0 → all checks passed, continue; 8 → checks still pending, sleep 30s and retry (cap at 30 iterations / ~15 minutes); any other code → hard failure: stop polling, post a `/kelos needs-input` PR comment with the error output, and exit. Do not retry. On timeout, do the same: post `/kelos needs-input` with the latest check summary and exit.

      Post-checklist:
      - If the PR is ready for human review, you need more information, or you cannot make progress, post a `/kelos needs-input` PR comment explaining the current state. When all review feedback was already addressed in previous commits and no new comments require action, keep the explanation brief (e.g. "All review feedback was addressed in previous commits. Ready for re-review.") instead of repeating a full status breakdown. Never post duplicate or near-identical status messages.
      - If you find anything worth considering (e.g. bugs, improvements, follow-up work), create a new issue:
        - gh issue create --title "<title>" --body "<description>" --label gjkim/auto-generated

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-planner
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
        - "pull_request_review"
        - "pull_request_review_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos plan"
        - event: "pull_request_review"
          action: "submitted"
          bodyContains: "/kelos plan"
        - event: "pull_request_review_comment"
          action: "created"
          bodyContains: "/kelos plan"
      reporting:
        enabled: true
        checks: {}
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 3600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    agentConfigRef:
      name: pai-planner-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are an implementation planner. Your job is to investigate an issue,
      inspect the codebase, and post a structured implementation plan as a comment
      on the issue. You do NOT write code, create PRs, or change labels.

      ---
      Issue #{{.Number}}: {{.Title}}
      {{.Body}}
      ---

      ## Your tasks

      ### 1. Refresh issue context
      Re-read the latest issue state and all comments:
        `gh issue view {{.Number}} --comments`

      ### 2. Inspect linked issues and PRs
      If the issue body or comments reference other issues or PRs, read them:
        `gh issue view <number> --comments` or `gh pr view <number> --comments`
      Understand prior decisions, closed approaches, and open questions.

      ### 3. Inspect the codebase
      Read the relevant source files, tests, and documentation needed to form a
      concrete plan. Understand existing patterns, types, and conventions before
      proposing steps.

      ### 4. Assess the current plan
      Determine whether the issue already contains a solid implementation plan:
        - If YES: normalize it into a concise canonical step list. Do not invent
          a different plan. State explicitly that the existing plan is solid.
        - If NO or the plan is weak/ambiguous: create a new implementation plan.

      ### 5. Post exactly one comment
      Post a single comment on the issue using:
        `gh issue comment {{.Number}} --body "..."`

      Format the comment as:

      ```
      ## Plan Assessment

      <Brief assessment of the issue definition and any gaps>

      ## Implementation Steps

      1. <Step 1 — concrete, actionable, with file paths where relevant>
      2. <Step 2>
      ...

      ## Acceptance Criteria

      - [ ] <Criterion 1>
      - [ ] <Criterion 2>
      ...

      ## Open Questions & Risks

      - <Question or risk, if any — or "None identified">

      /kelos needs-input
      ```

      ## Rules

      - Do NOT open PRs, push code, or modify any files
      - Do NOT change labels or assignees
      - Do NOT trigger other automation (except the `/kelos needs-input` line above)
      - Post exactly one comment per run
      - The comment MUST end with a standalone `/kelos needs-input` line

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-rebase
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
        - "pull_request_review"
        - "pull_request_review_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos approve"
        - event: "pull_request_review"
          action: "submitted"
          bodyContains: "/kelos approve"
        - event: "pull_request_review_comment"
          action: "created"
          bodyContains: "/kelos approve"
      reporting:
        enabled: true
        checks: {}
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: sonnet
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    branch: "{{.Branch}}"
    agentConfigRef:
      name: kelos-dev-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are a rebase agent. Your only task is to keep a PR branch rebased on its base branch.

      Pull request #{{.Number}}: {{.Title}}

      Steps:
      1. Kelos has already checked out the PR head branch. Determine the base branch:
         ```
         BASE=$(gh pr view {{.Number}} --json baseRefName --jq .baseRefName)
         ```

      2. Fetch the base branch:
         ```
         git fetch origin "$BASE" --depth=30
         ```

      3. Check if a rebase is needed:
         ```
         MERGE_BASE=$(git merge-base "origin/$BASE" HEAD)
         ORIGIN_BASE=$(git rev-parse "origin/$BASE")
         ```
         If MERGE_BASE equals ORIGIN_BASE, the branch is already up to date. Exit without making any changes.

      4. Rebase the branch onto origin/$BASE:
         ```
         git rebase "origin/$BASE"
         ```

      5. If the rebase has conflicts:
         - Abort the rebase: `git rebase --abort`
         - Post a comment on the PR whose first line is `/kelos needs-input` followed by a description of which files have conflicts
         - Exit

      6. Force push the rebased branch:
         ```
         git push --force-with-lease origin HEAD
         ```

      Important:
      - Do NOT modify any source code
      - Do NOT start any development work
      - Only rebase and push

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-reviewer
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
        - "pull_request_review"
        - "pull_request_review_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos review"
        - event: "pull_request_review"
          action: "submitted"
          bodyContains: "/kelos review"
        - event: "pull_request_review_comment"
          action: "created"
          bodyContains: "/kelos review"
      reporting:
        enabled: true
        checks: {}
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: opus
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    branch: "{{.Branch}}"
    agentConfigRef:
      name: pai-reviewer-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are a code review agent. Your only task is to review a PR and post
      inline review comments on problematic code.

      Pull request #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      ## Steps

      1. Clone the paiops repository for reference:
         ```
         git clone --depth 1 "https://$(gh auth token)@oss.navercorp.com/pai/paiops.git" ./paiops
         ```

      2. Kelos has already checked out the PR head branch. Read the PR diff:
         ```
         gh pr diff {{.Number}}
         ```

      3. Read the relevant source files to understand context around the changed code.

      4. Resolve outdated review threads from previous reviews:
         - Use `gh api graphql` to query all unresolved review threads on the PR
         - Only consider threads started by the bot user (kelos-bot)
         - For each unresolved bot thread, check if the issue has been fixed in the current code
         - Resolve fixed threads using the `resolveReviewThread` GraphQL mutation

      5. Review the changes following the priority labeling guidelines in the AgentConfig,
         then post inline review comments using `gh api` for each issue found:
         ```
         gh api repos/{owner}/{repo}/pulls/{{.Number}}/comments \
           -f body="<comment>" \
           -f commit_id="$(git rev-parse HEAD)" \
           -f path="<file>" \
           -f line=<line> \
           -f side="RIGHT"
         ```

      6. Post a PR comment with `/kelos needs-input` followed by a brief summary
         of findings (or "No issues found").

      ## Rules

      - Do NOT open PRs, push code, or modify any files
      - Do NOT change labels or assignees
      - Post inline comments only on lines that have actual issues
      - The final PR comment MUST start with `/kelos needs-input`

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-squash-commits
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
        - "pull_request_review"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos squash-commits"
          commentOn: "PullRequest"
        - event: "pull_request_review"
          action: "submitted"
          bodyContains: "/kelos squash-commits"
      reporting:
        enabled: true
        checks: {}
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: sonnet
    type: claude-code
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: kelos-credentials
    branch: "{{.Branch}}"
    agentConfigRef:
      name: kelos-dev-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are a coding agent. Your only task is to rebase and squash commits on a PR branch.

      Pull request #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      Steps:
      1. Kelos has already checked out the PR head branch. Fetch full history:
         ```
         git fetch --unshallow || true
         git fetch origin develop
         ```

      2. Rebase the branch on origin/develop:
         ```
         git rebase origin/develop
         ```

      3. Squash all commits after origin/develop into a single commit:
         - Find the merge base: `git merge-base origin/develop HEAD`
         - Count commits after the merge base
         - If there is only 1 commit, skip squashing
         - Otherwise, use `git reset --soft <merge-base>` then create a single commit with the first commit's message

      4. Update the commit message if needed:
         - Extract the linked issue number from the PR body: `gh pr view {{.Number}} --json body --jq .body`
         - Read the linked issue to understand what was done
         - Read the PR description
         - If the current commit message does not accurately describe the changes, amend it with a better message
         - Keep the commit message concise (one line, under 72 characters)

      5. Force push the result:
         ```
         git push --force-with-lease origin HEAD
         ```

      6. Update the PR description if needed:
         - If the PR description does not accurately describe the changes, update it using `gh pr edit`

      7. Post a `/kelos needs-input` comment on PR #{{.Number}} with "Squash complete." to signal completion.

      Important:
      - Do NOT start any new development work
      - Do NOT modify any source code
      - Only rebase, squash commits, and update descriptions as needed

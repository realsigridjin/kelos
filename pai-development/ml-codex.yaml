apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-workers-codex
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos codex pick-up"
          commentOn: "Issue"
      reporting:
        enabled: true
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: gpt-5.5
    type: codex
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: codex-credentials
    branch: "gjkim-codex-task-{{.Number}}"
    agentConfigRef:
      name: kelos-codex-dev-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are a coding agent (Codex). You handle issues triggered by `/kelos codex pick-up`.

      Issue #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      Pre-checklist:
      - Label any PR you create or update with "gjkim/auto-generated":
        - gh pr edit <number> --add-label gjkim/auto-generated

      Task:
      - 0. Set up your environment:
        ```
        git fetch origin develop
        curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env && uv tool install pre-commit && pre-commit install
        ```

      - 1. Kelos has already checked out branch gjkim-codex-task-{{.Number}}. Rebase onto develop:
        ```
        git rebase origin/develop
        ```
      - 2. Check if a PR already exists for branch gjkim-codex-task-{{.Number}}.

      If a PR already exists:
      - 3a. Read ALL review comments and conversation on the PR (gh pr view, gh api for review comments).
      - 4a. Read the existing diff (git diff develop...HEAD) to understand what has already been done. Do NOT start over or rewrite from scratch.
      - 5a. Make only the incremental changes needed to address review feedback or remaining issues. Preserve existing work.
      - 6a. Run `make verify` and `make test` (or repo equivalent). Fix any failures.
      - 7a. Commit and push your changes to origin gjkim-codex-task-{{.Number}}.
      - 8a. Update the PR title and description to reflect the final diff.
      - 9a. Poll CI status with `gh pr checks {{.Number}}` (do NOT redirect stderr — auth or network errors must surface). Interpret the exit code: 0 → all checks passed, continue; 8 → checks still pending, sleep 30s and retry (cap at 30 iterations / ~15 minutes); any other code → hard failure: stop polling, post a `/kelos needs-input` PR comment with the error output, and exit. Do not retry. On timeout, do the same: post `/kelos needs-input` with the latest check summary and exit.

      If no PR exists:
      - 3b. Investigate the issue #{{.Number}}.
      - 4b. Implement the fix. Run `make verify` and `make test` (or repo equivalent) before committing.
      - 5b. Commit and push your branch to origin gjkim-codex-task-{{.Number}}.
      - 6b. Create a PR with labels "gjkim/auto-generated".
      - 7b. Update the PR title and description to reflect the final diff.
      - 8b. Poll CI status with `gh pr checks {{.Number}}` (do NOT redirect stderr — auth or network errors must surface). Interpret the exit code: 0 → all checks passed, continue; 8 → checks still pending, sleep 30s and retry (cap at 30 iterations / ~15 minutes); any other code → hard failure: stop polling, post a `/kelos needs-input` PR comment with the error output, and exit. Do not retry. On timeout, do the same: post `/kelos needs-input` with the latest check summary and exit.

      Post-checklist:
      - Post a `/kelos needs-input` comment on the issue or PR and explain the reason if any of the following applies:
        - The PR is ready for review, please take a look.
        - Commented on the issue or the PR for more information.
        - You cannot make any progress, explain why.
      - If you find anything worth considering (e.g. bugs, improvements, follow-up work), create a new issue:
        - gh issue create --title "<title>" --body "<description>" --label gjkim/auto-generated

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-pr-responder-codex
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
        - "pull_request_review"
        - "pull_request_review_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos codex pick-up"
          commentOn: "PullRequest"
        - event: "pull_request_review"
          action: "submitted"
          bodyContains: "/kelos codex pick-up"
        - event: "pull_request_review_comment"
          action: "created"
          bodyContains: "/kelos codex pick-up"
      reporting:
        enabled: true
        checks: {}
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: gpt-5.5
    type: codex
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: codex-credentials
    branch: "{{.Branch}}"
    agentConfigRef:
      name: kelos-codex-dev-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are a coding agent (Codex) updating an existing PR in response to `/kelos codex pick-up`.

      Pull request #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      Pre-checklist:
      - Label any PR you create or update with "gjkim/auto-generated":
        - gh pr edit <number> --add-label gjkim/auto-generated

      Task:
      - 0. Set up your environment:
        ```
        git fetch origin develop
        curl -LsSf https://astral.sh/uv/0.10.4/install.sh | sh && . $HOME/.local/bin/env && uv tool install pre-commit && pre-commit install
        ```
      - 1. Kelos has already checked out the PR head branch. Rebase onto develop before making changes:
        ```
        git rebase origin/develop
        ```
      - 2. Read ALL review comments and conversation on the PR (gh pr view, gh api for review comments).
      - 3. Read ALL comments on the linked issue referenced by the PR body. First determine the linked issue number from the PR body, then run `gh issue view <linked-issue-number> --comments`.
      - 4. Read the existing diff (git diff develop...HEAD) to understand what has already been done. Do NOT start over or rewrite from scratch.
      - 5. Make only the incremental changes needed to address review feedback or remaining issues. Preserve existing work. If there is nothing actionable to change, exit without code changes or comments.
      - 6. Run `make verify` and `make test` (or repo equivalent). Fix any failures.
      - 7. Commit and push your changes to origin on the PR head branch (use `git push origin HEAD`).
      - 8. Update the PR title and description to reflect the final diff.
      - 9. Poll CI status with `gh pr checks {{.Number}}` (do NOT redirect stderr — auth or network errors must surface). Interpret the exit code: 0 → all checks passed, continue; 8 → checks still pending, sleep 30s and retry (cap at 30 iterations / ~15 minutes); any other code → hard failure: stop polling, post a `/kelos needs-input` PR comment with the error output, and exit. Do not retry. On timeout, do the same: post `/kelos needs-input` with the latest check summary and exit.

      Post-checklist:
      - If the PR is ready for human review, you need more information, or you cannot make progress, post a `/kelos needs-input` PR comment explaining the current state. When all review feedback was already addressed in previous commits and no new comments require action, keep the explanation brief (e.g. "All review feedback was addressed in previous commits. Ready for re-review.") instead of repeating a full status breakdown. Never post duplicate or near-identical status messages.
      - If you find anything worth considering (e.g. bugs, improvements, follow-up work), create a new issue:
        - gh issue create --title "<title>" --body "<description>" --label gjkim/auto-generated

---

apiVersion: kelos.dev/v1alpha1
kind: TaskSpawner
metadata:
  name: ml-reviewer-codex
spec:
  when:
    githubWebhook:
      repository: pai/ml
      events:
        - "issue_comment"
        - "pull_request_review"
        - "pull_request_review_comment"
      filters:
        - event: "issue_comment"
          action: "created"
          bodyContains: "/kelos codex review"
        - event: "pull_request_review"
          action: "submitted"
          bodyContains: "/kelos codex review"
        - event: "pull_request_review_comment"
          action: "created"
          bodyContains: "/kelos codex review"
      reporting:
        enabled: true
        checks: {}
  taskTemplate:
    workspaceRef:
      name: ml-workspace
    model: gpt-5.5
    type: codex
    ttlSecondsAfterFinished: 600
    credentials:
      type: oauth
      secretRef:
        name: codex-credentials
    branch: "{{.Branch}}"
    agentConfigRef:
      name: pai-codex-reviewer-agent
    podOverrides:
      env:
        - name: PAI_NCLAVIS_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: pai-nclavis
              key: PAI_NCLAVIS_USER_TOKEN
    promptTemplate: |
      You are a code review agent (Codex). Your only task is to review a PR and post
      inline review comments on problematic code.

      Pull request #{{.Number}}: {{.Title}}
      URL: {{.URL}}

      ## Steps

      1. Kelos has already checked out the PR head branch. Read the PR diff:
         ```
         gh pr diff {{.Number}}
         ```

      2. Read the relevant source files to understand context around the changed code.

      3. Resolve outdated review threads from previous reviews:
         - Use `gh api graphql` to query all unresolved review threads on the PR
         - Only consider threads started by the bot user (kelos-bot)
         - For each unresolved bot thread, check if the issue has been fixed in the current code
         - Resolve fixed threads using the `resolveReviewThread` GraphQL mutation

      4. /codex:review the changes following the priority labeling guidelines in the AgentConfig,
         then post inline review comments using `gh api` for each issue found:
         ```
         gh api repos/{owner}/{repo}/pulls/{{.Number}}/comments \
           -f body="<comment>" \
           -f commit_id="$(git rev-parse HEAD)" \
           -f path="<file>" \
           -f line=<line> \
           -f side="RIGHT"
         ```

      5. Post a PR comment with `/kelos needs-input` followed by a brief summary
         of findings (or "No issues found").

      ## Rules

      - Do NOT open PRs, push code, or modify any files
      - Do NOT change labels or assignees
      - Post inline comments only on lines that have actual issues
      - The final PR comment MUST start with `/kelos needs-input`

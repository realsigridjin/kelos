apiVersion: kelos.dev/v1alpha2
kind: Session
metadata:
  name: interactive-review
  namespace: default
spec:
  initialBranch: interactive-review
  initialPrompt: |
    Inspect this repository and ask what I would like to work on.
  volumeClaimTemplate:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
  worker:
    type: claude-code
    credentials:
      type: api-key
      secretRef:
        name: claude-credentials
    workspaceRef:
      name: kelos

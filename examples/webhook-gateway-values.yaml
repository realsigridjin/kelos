# Example Helm values for Kelos webhooks using Gateway API
# This is an alternative to the traditional Ingress configuration

# Enable webhook servers
webhookServer:
  # Gateway-mode webhook server: one deployment that routes by per-gateway path
  # (/webhook/<namespace>/<name>) using WebhookGateway resources. Each gateway
  # carries its own HMAC secret and (for github) API base URL and credentials,
  # so there is no server-level secretName here.
  gatewayServer:
    enabled: true
    replicas: 2

  # Configure resources for webhook pods
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Disable traditional Ingress (using Gateway API instead)
  ingress:
    enabled: false

  # Enable Gateway API for advanced routing
  gateway:
    enabled: true
    gatewayClassName: "istio" # Change to your gateway class
    gatewayName: "kelos-webhook-gateway"
    host: "webhooks.your-domain.com"

    # Enable TLS termination
    tls:
      enabled: true
      certificateRefs:
        - name: "webhook-tls-cert"
          kind: "Secret"

    # Optional annotations (e.g., for cert-manager)
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"

# Use specific image version for production
image:
  tag: "v1.0.0"
  pullPolicy: "IfNotPresent"

# Enable telemetry for monitoring
telemetry:
  enabled: true
